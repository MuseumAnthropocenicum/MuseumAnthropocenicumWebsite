<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum Anthropocenicum</title>
<style>
:root{
  --bg:#010203;
  --line:rgba(255,255,255,.08);
  --soft:rgba(255,255,255,.68);
  --faint:rgba(255,255,255,.42);
  --text:#f5f3ee;
}
*{box-sizing:border-box}
html,body{height:100%}
html{scroll-behavior:smooth}
body{
  margin:0;
  color:var(--text);
  font-family:Inter, Arial, sans-serif;
  background-color:var(--bg);
  background-image:
    radial-gradient(circle at 12% 18%, rgba(255,255,255,.65) 0 1px, transparent 1.5px),
    radial-gradient(circle at 76% 24%, rgba(255,255,255,.5) 0 1px, transparent 1.5px),
    radial-gradient(circle at 28% 72%, rgba(255,255,255,.45) 0 1px, transparent 1.5px),
    radial-gradient(circle at 88% 80%, rgba(255,255,255,.4) 0 1px, transparent 1.5px),
    radial-gradient(circle at 61% 62%, rgba(255,255,255,.35) 0 1px, transparent 1.5px),
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:
    420px 420px,
    560px 560px,
    620px 620px,
    700px 700px,
    500px 500px,
    42px 42px,
    42px 42px;
}
a{text-decoration:none;color:inherit}
.shell{
  min-height:100vh;
  width:min(1260px, calc(100% - 48px));
  margin:0 auto;
  padding:18px 0 28px;
  display:flex;
  flex-direction:column;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:24px;
  padding:10px 0 18px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
  min-width:0;
}
.brand img{
  width:52px;
  height:52px;
  object-fit:contain;
}
.brand-name{
  font-size:22px;
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
}
.nav{
  display:flex;
  gap:28px;
  flex-wrap:wrap;
}
.nav a{
  font-size:15px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--soft);
}
.nav a:hover{color:#fff}

.hero{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:58px 0 42px;
}
.hero-inner{
  width:min(840px, 100%);
}
.hero-logo{
  width:min(180px, 34vw);
  margin:0 auto 28px;
  opacity:.98;
}
h1{
  margin:0;
  font-size:clamp(36px, 5.2vw, 72px);
  line-height:1.02;
  letter-spacing:.08em;
  font-weight:500;
  text-transform:uppercase;
}
.kicker{
  margin-top:28px;
  font-size:clamp(18px, 2vw, 30px);
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--text);
}
.sub{
  margin:20px auto 0;
  max-width:760px;
  font-size:clamp(14px, 1.2vw, 22px);
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--soft);
  line-height:1.8;
}
.actions{
  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
  margin-top:42px;
}
.btn{
  min-width:210px;
  padding:16px 22px;
  border:1px solid rgba(255,255,255,.28);
  text-align:center;
  font-size:15px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#fff;
  background:rgba(255,255,255,.02);
}
.btn:hover{
  background:rgba(255,255,255,.08);
}

.viewport{
  position:relative;
  margin-top:46px;
  min-height:120px;
  border:1px solid rgba(255,255,255,.08);
  background:
    radial-gradient(circle at 18% 28%, rgba(255,255,255,.22) 0 1px, transparent 1.5px),
    radial-gradient(circle at 72% 56%, rgba(255,255,255,.18) 0 1px, transparent 1.5px),
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
  background-size: 380px 380px, 520px 520px, 48px 48px, 48px 48px;
}
.viewport::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(255,255,255,.02), transparent 36%, transparent 64%, rgba(255,255,255,.02));
  pointer-events:none;
}
.statusbar{
  margin-top:18px;
  display:flex;
  gap:34px;
  flex-wrap:wrap;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,.08);
  font-family:ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--soft);
}
.statusbar strong{
  color:#fff;
  font-weight:400;
}

@media (max-width: 900px){
  .topbar{flex-direction:column; align-items:flex-start}
  .nav{gap:18px}
  .brand-name{font-size:18px}
  .shell{width:min(100% - 24px, 1260px)}
  .btn{min-width:unset; width:100%}
  .actions{flex-direction:column}
  .statusbar{gap:14px}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <img src="logo.png" alt="Museum Anthropocenicum logo">
      <div class="brand-name">Museum Anthropocenicum</div>
    </div>

    <nav class="nav">
      <a href="#recit">Récit</a>
      <a href="#archive">Archive</a>
      <a href="#research">Recherche</a>
    </nav>
  </header>

  <main class="hero">
    <div class="hero-inner">
      <img class="hero-logo" src="logo.png" alt="">
      <h1>Museum Anthropocenicum</h1>
      <div class="kicker">Archive of Anthropocene Artifacts</div>
      <div class="sub">Open archaeological database of human civilization remains</div>

      <div class="actions">
        <a class="btn" href="#recit">[ Récit ]</a>
        <a class="btn" href="#archive">[ Archive ]</a>
        <a class="btn" href="#research">[ Recherche ]</a>
      </div>

      <div class="viewport" aria-hidden="true"></div>
    </div>
  </main>

  <footer class="statusbar">
    <div>STATUS : <strong>ONLINE</strong></div>
    <div>DATABASE : <strong>ACTIVE</strong></div>
    <div>SPECIMENS : <strong>000126</strong></div>
  </footer>
</div>
</body>
</html>
